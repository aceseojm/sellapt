<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="145" y1="52" x2="1042" y2="606" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F1"/>
      <stop offset="0.52" stop-color="#FFF3FB"/>
      <stop offset="1" stop-color="#F2EBFF"/>
    </linearGradient>
    <linearGradient id="headline" x1="112" y1="178" x2="512" y2="428" gradientUnits="userSpaceOnUse">
      <stop stop-color="#954BFF"/>
      <stop offset="0.5" stop-color="#C754E8"/>
      <stop offset="1" stop-color="#FF5CBF"/>
    </linearGradient>
    <linearGradient id="pill" x1="765" y1="99" x2="1065" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF67C7"/>
      <stop offset="0.45" stop-color="#8A4FFF"/>
      <stop offset="1" stop-color="#F8F1FF"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="758" y1="85" x2="1040" y2="424" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blurA" x="-40" y="-40" width="463" height="463" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blurB" x="855" y="-20" width="390" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="cardShadow" x="689" y="44" width="438" height="488" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#8F5BFF" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="53" y="58" width="467" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#D562D6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <g opacity="0.95">
    <g filter="url(#blurA)">
      <circle cx="191.5" cy="191.5" r="111.5" fill="#FF87D8" fill-opacity="0.55"/>
    </g>
    <g filter="url(#blurB)">
      <circle cx="1050" cy="175" r="99" fill="#C7AEFF" fill-opacity="0.7"/>
    </g>
  </g>

  <rect x="66" y="62" width="212" height="54" rx="27" fill="#0F5D6D"/>
  <text x="95" y="97" fill="#F8FBFF" font-family="Montserrat, Avenir Next, Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="25" font-weight="800" letter-spacing="2.2">MEDIS PARK</text>

  <text x="82" y="165" fill="#5B687C" font-family="Montserrat, Avenir Next, sans-serif" font-size="31" font-weight="700" letter-spacing="4.8">BRAIN CITY PREMIUM</text>

  <g filter="url(#softShadow)">
    <text x="82" y="246" fill="url(#headline)" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="74" font-weight="800">학교도 병원도 공원도</text>
    <text x="82" y="328" fill="url(#headline)" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="68" font-weight="800">걸어서 누리는</text>
    <text x="82" y="406" fill="url(#headline)" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="68" font-weight="800">브레인시티 핵심 입지</text>
  </g>

  <text x="84" y="474" fill="#506073" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="31" font-weight="600">실거주 만족과 미래가치를 함께 보는</text>
  <text x="84" y="516" fill="#506073" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="31" font-weight="600">브레인시티 메디스파크 로제비앙 모아엘가</text>

  <rect x="82" y="548" width="192" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.7"/>
  <rect x="292" y="548" width="186" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.56"/>
  <rect x="495" y="548" width="168" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.48"/>
  <text x="119" y="577" fill="#27354A" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="22" font-weight="700">도보 생활권</text>
  <text x="329" y="577" fill="#27354A" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="22" font-weight="700">의료복합타운 기대</text>
  <text x="538" y="577" fill="#27354A" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="22" font-weight="700">가족 선호 평면</text>

  <g filter="url(#cardShadow)">
    <rect x="735" y="72" width="346" height="428" rx="34" fill="#FFFDFD" fill-opacity="0.46"/>
    <rect x="736.5" y="73.5" width="343" height="425" rx="32.5" stroke="url(#glassStroke)" stroke-width="3"/>
    <rect x="766" y="104" width="284" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.48"/>
    <text x="800" y="131" fill="#243347" font-family="Montserrat, Avenir Next, sans-serif" font-size="22" font-weight="800" letter-spacing="2">WALKABLE VALUE</text>

    <rect x="766" y="161" width="284" height="284" rx="30" fill="url(#pill)"/>

    <rect x="808" y="258" width="28" height="116" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <rect x="846" y="229" width="28" height="145" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <rect x="884" y="198" width="28" height="176" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <rect x="922" y="178" width="28" height="196" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <rect x="960" y="214" width="28" height="160" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <rect x="998" y="243" width="28" height="131" rx="12" fill="#FFF7FF" fill-opacity="0.92"/>
    <path d="M779 389C834 346.333 913.333 322.333 1017 317V414H779V389Z" fill="#FFF8FF" fill-opacity="0.3"/>
    <circle cx="799" cy="196" r="16" fill="#FFF8FF" fill-opacity="0.62"/>
    <circle cx="1020" cy="347" r="20" fill="#FFF8FF" fill-opacity="0.3"/>

    <rect x="766" y="451" width="132" height="27" rx="13.5" fill="#FFFFFF" fill-opacity="0.62"/>
    <rect x="909" y="451" width="141" height="27" rx="13.5" fill="#FFFFFF" fill-opacity="0.44"/>
    <text x="791" y="471" fill="#2C3A4F" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="17" font-weight="700">도보 생활권</text>
    <text x="933" y="471" fill="#2C3A4F" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="17" font-weight="700">미래가치</text>
  </g>

  <text x="1060" y="586" text-anchor="end" fill="#657487" font-family="Apple SD Gothic Neo, AppleGothic, sans-serif" font-size="20" font-weight="700">브레인시티 메디스파크 로제비앙 모아엘가</text>
</svg>
